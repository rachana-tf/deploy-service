# One service, multiple stdio MCP servers. Build from Git (no docker push).
# Set build_source.repo_url and build_source.branch_name to your repo.
type: service
name: e2b-multi-stdio
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/rachana-tf/deploy-service
    branch_name: main
    ref: main
  build_spec:
    type: dockerfile
    dockerfile_path: multi-stdio/Dockerfile
    build_context_path: .
ports:
  - port: 8000
    expose: true
    protocol: TCP
    app_protocol: http
    host: tryout.tfy-usea1-ctl.devtest.truefoundry.tech
env:
  E2B_API_KEY_USER1: ""
  E2B_API_KEY_USER2: ""
workspace_fqn: tfy-usea1-devtest:tryout
replicas: 1
allow_interception: false
resources:
  node:
    type: node_selector
    capacity_type: spot_fallback_on_demand
  cpu_request: 0.2
  cpu_limit: 0.5
  memory_request: 200
  memory_limit: 500
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
